<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <link rel="stylesheet" href="/cesium/Widgets/widgets.css">
  <script src="/cesium/Cesium.js"></script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Three.js 小地图 - 山区铁道信号灯数字孪生</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Microsoft YaHei', Arial, sans-serif;
      background: #000;
    }

    #threeContainer {
      width: 100%;
      height: 100%;
    }

    .back-btn {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      padding: 10px 25px;
      background: rgba(0, 20, 40, 0.8);
      border: 1px solid rgba(0, 200, 255, 0.3);
      border-radius: 5px;
      color: #00d4ff;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s;
      backdrop-filter: blur(10px);
    }

    .back-btn:hover {
      background: rgba(0, 40, 80, 0.9);
      box-shadow: 0 0 15px rgba(0, 200, 255, 0.5);
    }

    .info-panel {
      position: absolute;
      top: 70px;
      left: 20px;
      bottom: 100px;
      width: 320px;
      background: rgba(0, 20, 40, 0.5);
      border: 1px solid rgba(0, 200, 255, 0.3);
      border-radius: 8px;
      padding: 20px;
      color: #fff;
      overflow-y: auto;
      backdrop-filter: blur(10px);
      box-shadow: 0 4px 20px rgba(0, 200, 255, 0.2);
    }

    .panel-section {
      margin-bottom: 25px;
    }

    .panel-section:last-child {
      margin-bottom: 0;
    }

    .video-container {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
      border-radius: 5px;
      overflow: hidden;
      margin: 10px 0;
    }

    .video-container iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .panel-title {
      color: #00d4ff;
      font-size: 16px;
      margin-bottom: 15px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(0, 200, 255, 0.3);
    }

    .signal-item {
      display: flex;
      align-items: center;
      margin: 12px 0;
      padding: 10px;
      background: rgba(0, 100, 150, 0.2);
      border-radius: 5px;
      border-left: 3px solid #00d4ff;
    }

    .signal-light {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      margin-right: 12px;
      box-shadow: 0 0 10px currentColor;
      animation: blink 2s infinite;
    }

    .signal-red { background: #ff3333; color: #ff3333; }
    .signal-green { background: #33ff33; color: #33ff33; }
    .signal-yellow { background: #ffff33; color: #ffff33; }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    .signal-info {
      flex: 1;
    }

    .signal-name {
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 4px;
    }

    .signal-status {
      font-size: 12px;
      color: #aaa;
    }

    .stats-panel {
      position: absolute;
      top: 70px;
      right: 20px;
      bottom: 100px;
      width: 320px;
      background: rgba(0, 20, 40, 0.5);
      border: 1px solid rgba(0, 200, 255, 0.3);
      border-radius: 8px;
      padding: 20px;
      color: #fff;
      overflow-y: auto;
      backdrop-filter: blur(10px);
    }

    .stat-item {
      display: flex;
      justify-content: space-between;
      margin: 8px 0;
      font-size: 13px;
    }

    .stat-label { color: #aaa; }
    .stat-value { color: #00d4ff; font-weight: bold; }

    .data-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 10px 0;
    }

    .data-card {
      background: rgba(0, 100, 150, 0.2);
      padding: 12px;
      border-radius: 5px;
      text-align: center;
    }

    .data-card-label {
      font-size: 12px;
      color: #aaa;
      margin-bottom: 5px;
    }

    .data-card-value {
      font-size: 18px;
      font-weight: bold;
      color: #00d4ff;
    }

    .progress-bar {
      width: 100%;
      height: 8px;
      background: rgba(0, 100, 150, 0.3);
      border-radius: 4px;
      overflow: hidden;
      margin: 8px 0;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #0066cc, #00d4ff);
      border-radius: 4px;
      transition: width 0.5s;
    }

    .control-panel {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 20, 40, 0.85);
      border: 1px solid rgba(0, 200, 255, 0.3);
      border-radius: 8px;
      padding: 15px 25px;
      color: #fff;
      display: flex;
      gap: 15px;
      backdrop-filter: blur(10px);
    }

    .control-btn {
      padding: 10px 20px;
      background: linear-gradient(135deg, #0066cc, #00d4ff);
      border: none;
      border-radius: 5px;
      color: #fff;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s;
    }

    .control-btn:hover {
      background: linear-gradient(135deg, #0088ff, #00ffff);
      box-shadow: 0 0 15px rgba(0, 200, 255, 0.5);
    }

    .loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #00d4ff;
      font-size: 24px;
      z-index: 9999;
    }

    .loading.hidden {
      display: none;
    }
  </style>
  <script type="module" crossorigin src="/assets/threejs-Cxv6Sy_5.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/modulepreload-polyfill-B5Qt9EMX.js">
</head>
<body>
  <div class="loading" id="loading">加载中...</div>

  <button class="back-btn" onclick="window.location.href='index.html'">← 返回首页</button>

  <div id="threeContainer"></div>

  <!-- 左侧数据面板 -->
  <div class="info-panel">
    <div class="panel-section">
      <h2 class="panel-title">🚦 信号灯监控</h2>
      <div id="signalList"></div>
    </div>

    <div class="panel-section">
      <h2 class="panel-title">📊 运营统计</h2>
      <div class="data-grid">
        <div class="data-card">
          <div class="data-card-label">今日通过列车</div>
          <div class="data-card-value">128</div>
        </div>
        <div class="data-card">
          <div class="data-card-label">平均速度</div>
          <div class="data-card-value">75km/h</div>
        </div>
        <div class="data-card">
          <div class="data-card-label">准点率</div>
          <div class="data-card-value">98.5%</div>
        </div>
        <div class="data-card">
          <div class="data-card-label">设备在线</div>
          <div class="data-card-value">100%</div>
        </div>
      </div>
    </div>

    <div class="panel-section">
      <h2 class="panel-title">⚡ 设备状态</h2>
      <div class="stat-item">
        <span class="stat-label">渲染帧率:</span>
        <span class="stat-value" id="fps">60 FPS</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" style="width: 100%"></div>
      </div>
      <div class="stat-item">
        <span class="stat-label">三角形数:</span>
        <span class="stat-value" id="triangles">0</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" style="width: 85%"></div>
      </div>
      <div class="stat-item">
        <span class="stat-label">绘制调用:</span>
        <span class="stat-value" id="drawCalls">0</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" style="width: 72%"></div>
      </div>
    </div>
  </div>

  <!-- 右侧数据面板 -->
  <div class="stats-panel">
    <div class="panel-section">
      <h2 class="panel-title">🎮 场景信息</h2>
      <div class="stat-item">
        <span class="stat-label">相机位置:</span>
        <span class="stat-value" id="cameraPos">--</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">相机目标:</span>
        <span class="stat-value" id="cameraTarget">--</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">缩放级别:</span>
        <span class="stat-value" id="zoomLevel">1.0x</span>
      </div>
    </div>

    <div class="panel-section">
      <h2 class="panel-title">🌡️ 环境监测</h2>
      <div class="data-grid">
        <div class="data-card">
          <div class="data-card-label">温度</div>
          <div class="data-card-value">-5°C</div>
        </div>
        <div class="data-card">
          <div class="data-card-label">湿度</div>
          <div class="data-card-value">65%</div>
        </div>
        <div class="data-card">
          <div class="data-card-label">风速</div>
          <div class="data-card-value">12m/s</div>
        </div>
        <div class="data-card">
          <div class="data-card-label">能见度</div>
          <div class="data-card-value">500m</div>
        </div>
      </div>
    </div>

    <div class="panel-section">
      <h2 class="panel-title">📹 实时监控</h2>
      <div class="video-container">
        <iframe
          src="//player.bilibili.com/player.html?bvid=BV1AWkWBVE8X&page=1&high_quality=1&danmaku=0"
          scrolling="no"
          border="0"
          frameborder="no"
          framespacing="0"
          allowfullscreen="true">
        </iframe>
      </div>
    </div>

    <div class="panel-section">
      <h2 class="panel-title">🔧 系统状态</h2>
      <div class="stat-item">
        <span class="stat-label">运行状态:</span>
        <span class="stat-value" id="systemStatus">正常</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">信号灯数量:</span>
        <span class="stat-value" id="signalCount">5</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">运行时间:</span>
        <span class="stat-value" id="uptime">0s</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">最后更新:</span>
        <span class="stat-value" id="lastUpdate">--</span>
      </div>
    </div>

    <div class="panel-section">
      <h2 class="panel-title">📋 操作说明</h2>
      <div class="stat-item">
        <span class="stat-label">旋转:</span>
        <span class="stat-value">左键拖拽</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">缩放:</span>
        <span class="stat-value">滚轮</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">平移:</span>
        <span class="stat-value">右键拖拽</span>
      </div>
    </div>
  </div>

  <div class="control-panel">
    <button class="control-btn" onclick="window.resetView()">🎯 复位视角</button>
    <button class="control-btn" onclick="window.toggleSignals()">🚦 切换信号</button>
    <button class="control-btn" onclick="window.trainAnimation()">🚂 列车动画</button>
    <button class="control-btn" onclick="window.toggleRotation()">🔄 自动旋转</button>
  </div>

</body>
</html>
